# full-run.yml — Stage 3: full 89-task benchmark on the self-hosted eval runner
# (spec §6). Dispatched automatically by smoke.yml on smoke pass (D6), or by a
# maintainer. Mints a $10-capped key, runs 1 trial × 89 tasks, pulls the ledger,
# runs validity assertions, emits + commits results/runs/<run-id>.json, then
# triggers the leaderboard regen.
name: full-run

on:
  workflow_dispatch:
    inputs:
      pr:     { description: "PR number", required: true }
      author: { description: "PR author github login", required: true }

# Org-wide single-slot: at most one full run anywhere at a time; others queue,
# never cancel (spec §6.1.1 / §8 full.org_concurrency = 1). The group is a fixed
# literal ON PURPOSE — do NOT fold the PR/SHA in, or two PRs could run at once
# and break the single-slot invariant.
#
# No double-dispatch (SEC M8): full-run is dispatched only by smoke.yml's
# trigger-full job, and smoke now fires exactly once per push (single-event gate
# — see smoke.yml DEDUP), so full-run is dispatched once per passing smoke. This
# org-wide single slot then serializes anything that still slips through.
concurrency:
  group: full-run
  cancel-in-progress: false

permissions:
  contents: read
  actions: write          # to dispatch leaderboard.yml

jobs:
  full:
    # Repo-variable toggle, same as smoke.yml: default GitHub-hosted (interim,
    # maintainer-approved, no egress lockdown); set EVAL_RUNS_ON to
    # ["self-hosted","eval"] when the box registers (spec §6.3/D9).
    runs-on: ${{ fromJSON(vars.EVAL_RUNS_ON || '"ubuntu-latest"') }}
    environment: eval-runner          # OPENROUTER_MANAGEMENT_KEY + RESULTS_BOT_TOKEN (§3)
    env:
      # Job-level so the commit step's `if:` can see it (the secrets context is
      # not available in step-level if). Empty until the PAT is set → the commit
      # step skips and the artifact upload below preserves the run output.
      RESULTS_BOT_TOKEN: ${{ secrets.RESULTS_BOT_TOKEN }}
    outputs:
      # Whether the commit step actually ran (it skips while RESULTS_BOT_TOKEN
      # is unset) — gates the leaderboard dispatch: no new commit on main means
      # nothing to regenerate, and leaderboard.yml needs the same missing PAT.
      committed: ${{ steps.commit.outcome == 'success' }}
    steps:
      - name: Checkout PR merge ref (gated behind judge + smoke — spec §3)
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.inputs.pr }}/merge
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Hosted-mode toolchain (python 3.12 + patched harbor + task network);
      # no-op on the eval box, where the runner image bakes all of this in.
      - uses: ./.github/actions/setup-eval

      # Mint $10 key → harbor 1×89 → ledger pull → validity assertions →
      # results/runs/<run-id>.json (spec §6.1). runner.mjs deletes the key and
      # records void/anomaly flags; exits non-zero on a hard failure.
      - name: Run full benchmark (mint capped key → harbor 89 → ledger → validity)
        env:
          OPENROUTER_MANAGEMENT_KEY: ${{ secrets.OPENROUTER_MANAGEMENT_KEY }}
        run: |
          node competition/runner.mjs \
            --type full \
            --pr "${{ github.event.inputs.pr }}" \
            --author "${{ github.event.inputs.author }}" \
            --submission "submissions/${{ github.event.inputs.author }}"

      # Commit the per-run results JSON to main via the fine-grained bot PAT
      # (contents:write on this repo only — spec §3/D15). Not github.token so the
      # push is attributed to the bot and can target the default branch.
      #
      # INTERIM: while RESULTS_BOT_TOKEN is not yet set in the eval-runner
      # environment, skip the push and upload the results as a workflow artifact
      # instead (step below) so a run's output is never silently lost. Once the
      # PAT lands, this step takes over and the artifact becomes a byproduct.
      - name: Commit results/ to main
        id: commit
        if: env.RESULTS_BOT_TOKEN != ''
        run: |
          git config user.name  "arena-results-bot"
          git config user.email "arena-results-bot@users.noreply.github.com"
          # runner.mjs wrote results/runs/*.json into the working tree (on the PR
          # merge ref). Preserve those artifacts, then land them on top of main.
          mkdir -p "$RUNNER_TEMP/results-runs"
          cp -R results/runs/. "$RUNNER_TEMP/results-runs/" 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp -R "$RUNNER_TEMP/results-runs/." results/runs/ 2>/dev/null || true
          git add results/runs/
          if git diff --cached --quiet; then
            echo "No new results to commit."
          else
            git commit -m "results: full run for PR #${{ github.event.inputs.pr }} (${{ github.event.inputs.author }})"
            git push "https://x-access-token:${RESULTS_BOT_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          fi

      # Always preserve the run output as an artifact (90-day retention). This
      # is the ONLY sink while RESULTS_BOT_TOKEN is unset; afterwards it's a
      # convenience copy. always() so a failed/voided run's JSON survives too.
      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-pr${{ github.event.inputs.pr }}
          path: results/runs/
          if-no-files-found: warn

  # Regenerate + commit the leaderboard after the run lands (spec §6.1.9/§7.2).
  trigger-leaderboard:
    needs: full
    # Only when a results commit actually landed on main (i.e. the PAT is set).
    if: always() && needs.full.result == 'success' && needs.full.outputs.committed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch leaderboard.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run leaderboard.yml
