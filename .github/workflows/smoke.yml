# smoke.yml — Stage 2: smoke gate on the self-hosted eval runner (spec §6).
#
# Gated behind checks.yml (static + judge must be green): this workflow triggers
# on `workflow_run` completion of `checks` and self-cancels unless that run
# concluded success (spec §5.3 — smoke/full `needs:` the judge check). It mints a
# $1.50-capped key, runs the 16-task smoke set median-of-3 on the eval box, pulls
# the ledger, gates on pass count, and on pass dispatches full-run.yml (D6).
name: smoke

on:
  # Chained after checks succeed. workflow_run gives us the trusted default-branch
  # copy of this workflow while still referencing the PR that was checked.
  workflow_run:
    workflows: [checks]
    types: [completed]
  # Manual re-run / maintainer path.
  workflow_dispatch:
    inputs:
      pr:     { description: "PR number", required: true }
      author: { description: "PR author github login", required: true }

# Per-author group so one author's runs queue (never cancel) but different
# authors run independently (spec §6.1.1 — smoke keyed per-author, queued).
concurrency:
  group: smoke-${{ github.event.workflow_run.head_repository.owner.login || github.event.inputs.author }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write          # to dispatch full-run.yml on pass

jobs:
  smoke:
    # Only proceed when the upstream checks run actually passed (spec §5.3 gate).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, eval]     # dedicated eval box (spec §6.3/D9)
    environment: eval-runner          # OPENROUTER_MANAGEMENT_KEY lives here (§3)
    outputs:
      passed: ${{ steps.smoke.outputs.passed }}
      pr: ${{ steps.ctx.outputs.pr }}
      author: ${{ steps.ctx.outputs.author }}
    steps:
      # Resolve PR + author from either trigger. For workflow_run we read the
      # PR number off the triggering run's payload; author = head repo owner.
      - name: Resolve PR context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr=${{ github.event.inputs.pr }}" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.inputs.author }}" >> "$GITHUB_OUTPUT"
          else
            PR="$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
              --jq '.[0].number')"
            echo "pr=$PR" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.workflow_run.head_repository.owner.login }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR merge ref (gated behind judge — spec §3)
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.ctx.outputs.pr }}/merge
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Mint capped key → spawn harbor → pull ledger → score → emit results JSON
      # (spec §6.1). runner.mjs handles key lifecycle, validity assertions, and
      # writing results/runs/<run-id>.json. Exit non-zero if pass count < gate.
      - name: Run smoke (mint capped key → harbor 16 median-of-3 → ledger → gate)
        id: smoke
        env:
          OPENROUTER_MANAGEMENT_KEY: ${{ secrets.OPENROUTER_MANAGEMENT_KEY }}
        run: |
          if node competition/runner.mjs \
              --type smoke \
              --pr "${{ steps.ctx.outputs.pr }}" \
              --author "${{ steps.ctx.outputs.author }}" \
              --submission "submissions/${{ steps.ctx.outputs.author }}"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # On smoke pass, automatically kick the full run (spec §6.1.9/D6).
  trigger-full:
    needs: smoke
    if: needs.smoke.outputs.passed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch full-run.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run full-run.yml \
            -f pr="${{ needs.smoke.outputs.pr }}" \
            -f author="${{ needs.smoke.outputs.author }}"
