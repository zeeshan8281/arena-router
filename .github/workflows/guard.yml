# Task-agnosticity guard — ci-anti-abuse §3a. Runs on every PR (cheap, ~free):
# static tripwire always; LLM judge if a judge key is configured. Triage only —
# findings label the PR for human review, the tripwire hard-fails obvious embeds.
name: guard
on:
  pull_request:
  workflow_dispatch:

jobs:
  task-agnosticity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Static tripwire (task IDs + solution strings)
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          git diff "${BASE:-HEAD~1}"...HEAD > /tmp/pr.diff
          node competition/anti-abuse/tripwire.mjs --diff /tmp/pr.diff

      - name: LLM judge (task-agnosticity)
        continue-on-error: true   # triage: labels for review, never the final verdict
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_JUDGE_KEY }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then echo "judge skipped (no OPENROUTER_JUDGE_KEY set)"; exit 0; fi
          node competition/anti-abuse/judge.mjs --diff /tmp/pr.diff --json | tee /tmp/verdict.json
          # TODO: post verdict as a PR comment + apply 'suspicious'/'violation' label
