# squid.conf — AutoRouter Arena v2 eval-box egress allowlist proxy
#
# Role (impl-spec §6.4 / D18): the ONLY route out of the internal-only Docker
# network. Task containers have no direct route to the internet; their sole
# path to anything off-box is CONNECT tunnels through this proxy. Every host a
# harness or task setup wants to reach must appear on the allowlist below or the
# request is denied. Enforcement is by CONNECT hostname (SNI/HTTP CONNECT target),
# not by IP — pinned Verified images fetch from CDNs whose IPs churn.
#
# Allowlist derivation (§6.4): the list below is the SEED, not the final answer.
# It contains openrouter.ai (the only inference endpoint pi is allowed to hit)
# plus the package registries the 89 pinned Verified images legitimately need
# during task setup. WP7 MUST empirically derive the final list by running the
# full 89-task benchmark against a LOG-ONLY variant of this proxy (comment out the
# final `http_access deny all`, or run with `http_access allow CONNECT` + rich
# logging) and diffing the observed CONNECT hosts against this seed. Add only the
# hosts that show up and are legitimate; do not widen speculatively.
#
# DELIBERATELY NOT ALLOWED: the Anthropic API (api.anthropic.com). The judge
# never runs inside eval (§6.4 / §3) — it only reads the PR diff via the GitHub
# API in a separate pull_request_target job. Inference inside eval is
# OpenRouter-only, so Anthropic has no business egressing from a task container
# and is intentionally absent from the allowlist.

# ---------------------------------------------------------------------------
# Listener
# ---------------------------------------------------------------------------
# Task containers reach us via HTTPS_PROXY/HTTP_PROXY=http://squid:3128 (§6.2).
http_port 3128

# We do NOT terminate TLS. All allowed traffic is CONNECT-tunnelled (HTTPS); we
# gate on the CONNECT target hostname and pass bytes through opaquely.

# ---------------------------------------------------------------------------
# Allowlist — exactly the §6.4 seed hosts, nothing else
# ---------------------------------------------------------------------------
# dstdomain with a leading dot matches the host and its subdomains; a bare host
# matches that exact host. We keep entries exact/minimal to avoid over-allowing.

# Inference (the only model endpoint pi may call)
#
# !!! KEY-MINTING LIMITATION (SEC M6) — READ BEFORE TOUCHING THIS LINE !!!
# openrouter.ai ALSO serves the key-provisioning API (POST /api/v1/keys). We gate
# egress by CONNECT hostname only — HTTPS hides the request PATH inside the TLS
# tunnel — so this allowlist CANNOT distinguish "call inference" from "mint/refund
# a key". A task container that reaches openrouter.ai at all could, in principle,
# hit the provisioning endpoints too. squid cannot close this gap. The real
# controls, which live OUTSIDE this file, are:
#   (a) SCOPE: the per-run key injected into task containers (OPENROUTER_API_KEY)
#       is a capped inference key with NO provisioning/management scope — even if
#       a task calls /api/v1/keys it has no authority to mint or read keys.
#   (b) ISOLATION: the OPENROUTER_MANAGEMENT_KEY (which DOES have provisioning
#       scope) is held ONLY by runner.mjs in the trusted runner step and is NEVER
#       injected into a task container. A task container therefore never holds a
#       credential that /api/v1/keys would honor for minting.
# Task containers get (a) only and never (b); confirm both invariants in
# runner.mjs / runner-setup.md. An ICAP/url_regex path filter is NOT feasible
# here (traffic is opaque CONNECT/TLS); pinning to specific IPs is also
# impractical (openrouter.ai fronts a churning CDN). So: comment + scope/isolation
# are the mitigation, documented loudly here on purpose.
acl allowed_hosts dstdomain openrouter.ai

# Python packaging
acl allowed_hosts dstdomain pypi.org
acl allowed_hosts dstdomain files.pythonhosted.org

# Node packaging
acl allowed_hosts dstdomain registry.npmjs.org

# Debian / Ubuntu apt
acl allowed_hosts dstdomain deb.debian.org
acl allowed_hosts dstdomain security.debian.org
acl allowed_hosts dstdomain archive.ubuntu.com
acl allowed_hosts dstdomain security.ubuntu.com

# Rust / cargo
acl allowed_hosts dstdomain crates.io
acl allowed_hosts dstdomain static.crates.io

# Go modules
acl allowed_hosts dstdomain proxy.golang.org

# GitHub (task setup fetches: clones, release/codeload tarballs, LFS/raw objects)
acl allowed_hosts dstdomain github.com
acl allowed_hosts dstdomain codeload.github.com
acl allowed_hosts dstdomain objects.githubusercontent.com

# Agent install-time hosts (SEC M7) — INSTALL-TIME ONLY.
# install-pi.sh.j2 runs inside the task container and, on images that do not
# already ship a Node runtime, fetches nvm's installer from raw.githubusercontent.com
# and the Node tarball from nodejs.org. Neither was allowlisted, so the install
# failed behind the enforcing proxy. PREFERRED long-term fix is to pre-bake Node
# into the pinned eval images and drop the runtime curl|bash (see runner-setup.md
# §4/§8); until then these two hosts are allowlisted so the install path works.
# registry.npmjs.org (above) covers `npm install -g pi.tgz`'s transitive deps.
acl allowed_hosts dstdomain raw.githubusercontent.com   # nvm install.sh (install-time only)
acl allowed_hosts dstdomain nodejs.org                  # Node tarball via nvm (install-time only)

# GitHub Actions self-hosted runner control plane (SEC C2c) — the runner now
# egresses ONLY through this proxy (no direct bridge). The Actions agent needs
# these to register, long-poll for jobs, upload logs, and pull actions:
acl allowed_hosts dstdomain api.github.com                       # REST (registration, gh api in workflows)
acl allowed_hosts dstdomain .actions.githubusercontent.com       # run/broker/results pipelines
acl allowed_hosts dstdomain vstoken.actions.githubusercontent.com
# actions/setup-node@v4 pulls Node from nodejs.org (allowlisted above); actions
# tarballs come from codeload/objects.githubusercontent.com (allowlisted above).

# ---------------------------------------------------------------------------
# Ports / method safety
# ---------------------------------------------------------------------------
# Only allow CONNECT to 443 (HTTPS). Plain-HTTP forwarding and CONNECT to
# arbitrary ports are refused — everything the images need is HTTPS.
acl SSL_ports port 443
acl CONNECT   method CONNECT

# Deny CONNECT to anything but the TLS port, regardless of host.
http_access deny CONNECT !SSL_ports

# ---------------------------------------------------------------------------
# Access decision — allow the allowlist, then fail closed
# ---------------------------------------------------------------------------
http_access allow allowed_hosts

# Everything else is denied. This is the fail-closed default (§6.4): unknown
# host → no egress. Combined with the internal-only network having no other
# route out, a harness that ignores the proxy simply gets nothing.
http_access deny all

# ---------------------------------------------------------------------------
# Logging (forensics / WP7 log-only allowlist derivation) — §6.4
# ---------------------------------------------------------------------------
# Log every request with the CONNECT target so incident review and WP7's
# empirical host diff both have a complete record. Logs are archived per run and
# retained 90 days on the box (rotation/retention handled at the host level —
# see runner-setup.md).
logformat arena %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log /var/log/squid/access.log arena

# Keep cache_log for squid's own diagnostics; no object caching (proxy only).
cache_log /var/log/squid/cache.log
cache deny all

# Don't leak the box identity to upstreams or downstreams.
via off
forwarded_for delete
httpd_suppress_version_string on
