# docker-compose.yml — AutoRouter Arena v2 eval box (impl-spec §6.3 / §6.4)
#
# Two services on one bare-metal box (Hetzner AX52-class, 16 cores / 64 GB / NVMe):
#   - runner : GitHub Actions self-hosted runner (label `eval`). smoke.yml /
#              full-run.yml jobs land here. It drives Harbor, which spins up the
#              per-task containers.
#   - squid  : the ONLY egress path (§6.4). Straddles the internal + egress nets.
#
# Network topology (§6.4 / D18) — this is the load-bearing security property:
#   - `internal` network is `internal: true`  → NO route off-box. Task
#     containers (created by Harbor at runtime) attach here and can reach ONLY
#     other members of `internal`, i.e. squid. No proxy → no connectivity.
#   - squid is dual-homed: on `internal` (so task containers can reach it at
#     http://squid:3128) AND on `egress` (a normal bridge with a route out).
#     squid is the sole bridge between the two, and it only forwards allowlisted
#     CONNECT hosts. Everything else fails closed.
#   - The runner ALSO sits on `internal` only (SEC C2c). It holds
#     OPENROUTER_MANAGEMENT_KEY (key-minting) + RESULTS_BOT_TOKEN and runs
#     runner.mjs from the PR merge ref, so it is attacker-influenced. If it had
#     an unrestricted bridge it could exfiltrate those secrets to any host,
#     bypassing the entire squid allowlist. Instead it egresses ONLY through
#     squid via HTTPS_PROXY/HTTP_PROXY=http://squid:3128 (github.com is on the
#     allowlist so job polling/log streaming still works), and has no direct
#     default route out.
#   - DEFENSE IN DEPTH: the network lockdown is a backstop, not the primary
#     control. The primary control against RCE-driven key exfil is NOT running
#     untrusted PR code as the runner (a CI/runner design property — see
#     runner.mjs checkout-overlay note in runner-setup.md §6). This compose file
#     does what it can at the network layer.
#
# NOTE ON RUNTIME TASK CONTAINERS: Harbor (invoked by runner.ts inside the
# runner) creates the 89 task containers itself via the mounted Docker socket.
# Those containers are NOT declared here. Harbor MUST attach them to the
# `internal` network and inject HTTPS_PROXY/HTTP_PROXY=http://squid:3128 +
# NO_PROXY per §6.2. The network is created here (external-referenceable name
# below) so Harbor can join it. This compose file only stands up the two
# long-lived services + the two networks.

services:
  # ------------------------------------------------------------------ squid
  squid:
    image: ubuntu/squid:latest
    container_name: arena-squid
    restart: unless-stopped
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      # Proxy access logs live on a host bind-mount so host-level logrotate can
      # enforce the 90-day retention (§6.4). See runner-setup.md.
      - /var/log/arena-squid:/var/log/squid
    networks:
      - internal   # task containers reach squid here (no route out on this net)
      - egress     # squid's own path to the allowlisted upstreams
    # squid never needs to initiate anything except to upstreams via egress.
    healthcheck:
      test: ["CMD", "sh", "-c", "squid -k check || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ------------------------------------------------------------------ runner
  runner:
    # Self-hosted GitHub Actions runner. Any maintained runner image works;
    # myoung34/github-runner is a common choice. Pin a digest in production.
    image: myoung34/github-runner:latest
    container_name: arena-gh-runner
    restart: unless-stopped
    environment:
      # --- GH runner registration (fill from the eval-runner GH environment) ---
      # Repo the runner attaches to, e.g. https://github.com/<org>/<repo>
      REPO_URL: ${GH_REPO_URL}
      # Short-lived registration token (Settings → Actions → Runners → New).
      # Prefer minting this at boot from a fine-grained PAT rather than storing it.
      RUNNER_TOKEN: ${GH_RUNNER_TOKEN}
      RUNNER_NAME: arena-eval-01
      # Label MUST be `eval` — smoke.yml / full-run.yml target `runs-on: [self-hosted, eval]`.
      LABELS: eval
      RUNNER_SCOPE: repo
      # Ephemeral so a job never inherits a dirty runner from a prior run.
      EPHEMERAL: "true"
      DISABLE_AUTO_UPDATE: "true"
      # --- Egress lockdown (SEC C2c) ---------------------------------------
      # The runner sits on the internal-only network with NO direct route out;
      # its SOLE path off-box is squid. Point every standard proxy var at squid
      # so the GH Actions agent (registration, job polling, log streaming, git,
      # tool downloads) and runner.mjs all tunnel through the allowlist. squid
      # resolves upstream DNS on the egress side, so the runner needs no direct
      # DNS either. github.com is allowlisted (squid.conf), so polling works.
      # A harness that clears these vars gets nothing — no proxy + no route =
      # fail closed, exactly like the task containers.
      HTTP_PROXY: "http://squid:3128"
      HTTPS_PROXY: "http://squid:3128"
      http_proxy: "http://squid:3128"
      https_proxy: "http://squid:3128"
      # Never proxy on-box/loopback traffic (Docker socket peers, squid itself).
      NO_PROXY: "localhost,127.0.0.1,squid,::1"
      no_proxy: "localhost,127.0.0.1,squid,::1"
    volumes:
      # Harbor (run by the workflow) needs the Docker API to create task
      # containers. Mounting the socket makes those containers siblings on this
      # host's Docker daemon — which is why the `internal`/`egress` networks are
      # created here with stable names Harbor can attach to.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent Docker image cache lives on the host daemon (NVMe); the
      # pre-pull script (runner-setup.md) warms the 89 pinned images once.
      - runner-work:/actions-runner/_work
    networks:
      # SEC C2c: internal-only. The runner egresses solely via squid (see the
      # HTTP(S)_PROXY env above); it has NO direct bridge to the internet, so a
      # compromised runner cannot exfiltrate OPENROUTER_MANAGEMENT_KEY /
      # RESULTS_BOT_TOKEN off the allowlist.
      - internal
    depends_on:
      - squid

networks:
  # Internal-only: NO route out. `internal: true` tells Docker not to attach a
  # gateway to the host's default bridge, so members cannot egress except by
  # talking to a dual-homed peer (squid). This is the §6.4 fail-closed core.
  internal:
    name: arena-internal
    internal: true
  # Normal bridge with outbound route. ONLY squid (egress side) lives here — it
  # is the sole bridge between `internal` and the internet. Neither the runner
  # nor task containers may attach here (SEC C2c): everything else reaches the
  # outside only by tunnelling through squid on the internal network.
  egress:
    name: arena-egress
    driver: bridge

volumes:
  runner-work:
